name: Bug Report
description: Something is broken in OVERHEAT — gameplay, physics, audio, or rendering.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this template to help us reproduce and fix the issue.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which system is affected?
      options:
        - Player / Controls
        - Physics / Rapier
        - Heat System
        - Ore / Extraction
        - Audio / AudioEngine
        - HUD / Dashboard
        - Terrain / Noise
        - Zustand Store
        - Koota ECS
        - Post-FX / Rendering
        - CI / Build
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps that trigger the bug.
      placeholder: |
        1. Load the game
        2. Start extracting ore
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / environment
      placeholder: "Chrome 124, macOS 14.4"
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console errors / logs
      description: Paste any relevant browser console output.
      render: text
    validations:
      required: false
