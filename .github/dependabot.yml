version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    groups:
      react-three-ecosystem:
        patterns:
          - "@react-three/*"
          - "three"
          - "postprocessing"
        update-types:
          - minor
          - patch
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "vite"
          - "@vitejs/*"
        update-types:
          - minor
          - patch
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
